### Reorg-safe timelocks

Three composed parameters keep the refund/claim windows safe under chain reorganisation, enforced at **three layers** (taker session check, maker fund check, and the consensus fund-path):

- `SwapReorgMargin = 100`, a claim is valid iff `height + SwapReorgMargin ≤ UnlockHeight`.
- `SwapTimelockWindow = 200`, blocks after funding before the refund branch opens (must exceed the margin, leaving a non-empty claim window).
- `SwapMinClaimWindow = 50`, minimum open claim window an honest maker must leave for the off-chain lock + co-sign + claim mining.

The invariant `SwapTimelockWindow ≥ SwapReorgMargin + SwapMinClaimWindow` holds by default (`200 ≥ 100 + 50`). Both the maker (at `Fund`) and the taker (at `VerifyFundedAndLock`) refuse a swap whose unlock height leaves no usable claim window, so neither party can be tricked into locking value it can never recover.

### Operational hardening

After the S3 audit, the public RPC `/swaps/take` endpoint is **disabled unless the operator sets `OBX_PUBLIC_SWAPS=1`**, so a public node cannot be driven to fund swaps that **drain an operator's** real balance; the operator's real Nano address was likewise removed from the public Vercel proxy. Take requests now display amounts, not merely asset names.

### Security properties

- **Atomicity.** Both legs settle or neither does. The OBX claim and the XNO sweep are unlocked by the *same* secret `sA` (`T = sA·G`): the taker cannot take OBX without revealing `sA`, and revealing `sA` lets the maker sweep the XNO.
- **Refund safety.** If the taker never claims, the maker reclaims its OBX at the `SwapTimelockWindow` refund branch. If the maker misbehaves or aborts before the taker locks XNO, the taker has locked nothing. Safe leg ordering guarantees no party commits value before the prior leg is verified on-chain.
- **Anti-griefing / fund-recovery.** Carrying `ŝ_a` in ClaimRequest lets the maker extract `sA` straight from the on-chain claim with **zero** taker cooperation after co-signing, surviving crash/resume.

*(A source-editable BPMN 2.0 version of the full swap process is provided at `docs/OBX_XNO_atomic_swap.bpmn`.)*
## Post-Quantum Path

Obscura's classical privacy stack, X25519 stealth addresses, Pedersen commitments, Schnorr spend authority, and a group-of-unknown-order (RSA/class-group) anonymity accumulator, derives all of its hardness from the discrete-logarithm and integer-factorisation problems. A cryptographically relevant quantum computer running Shor's algorithm breaks every one of these primitives simultaneously, and the threat is not deferred to the day such a machine exists: a *harvest-now-decrypt-later* adversary can record the public chain today and de-anonymise it retroactively. This section describes the implemented migration path. We are explicit throughout about what is *proven* and what rests on *standardised cryptography*. The entire PQ stack lives off the default consensus path (it is gated by `tx.Version == 2` and the presence of PQ fields, see `pkg/chain/pqvalidate.go`), so the shipping classical coin's size and speed are unaffected.

**ML-KEM-768 stealth (`pkg/pqstealth`).** Recipient privacy is provided by ML-KEM-768 (Kyber, FIPS 203) from the Go 1.25 standard library `crypto/mlkem`, no external dependency, no trusted setup. A recipient publishes an encapsulation key $ek$ as their PQ view key. A sender encapsulates, obtaining $(ss, ct) \leftarrow \mathrm{Encaps}(ek)$ with $ct$ being $1088$ bytes, attaches $ct$ to the output, and derives all per-output material from $ss$ via a domain-separated BLAKE2b KDF: a $16$-byte detection $\mathit{tag} = \mathrm{KDF}(\text{"tag"}, ss)$, an amount keystream $\mathrm{KDF}(\text{"enc"}, ss)$, and a $16$-byte MAC $= \mathrm{KDF}(\text{"mac"}, ss, \mathit{enc})$. The recipient scans by decapsulating and recomputing the tag in constant time; ML-KEM's implicit rejection guarantees that a ciphertext not meant for the recipient yields a pseudorandom $ss$ whose tag will not match. Because ML-KEM is IND-CCA2 under Module-LWE, for which no quantum attack better than generic lattice reduction is known, recipient linkage and encrypted amounts remain private even against a harvest-now adversary. This is *standard, NIST-standardised cryptography*; the binding of the construction (KDF labelling, MAC-then-detect) is Obscura's own and runs in the live ML-KEM stealth path.

**Lattice/Ajtai commitments (`pkg/pqcommit`).** To replace Pedersen amount commitments we implement a BDLOP-style lattice commitment whose binding rests on the Short Integer Solution (SIS / Ajtai) problem. For public random matrices $A_1 \in \mathbb{Z}_q^{n_1 \times m}$, $A_2 \in \mathbb{Z}_q^{1 \times m}$ (sampled from a fixed BLAKE2b XOF seed by rejection sampling, nothing-up-my-sleeve, no setup), and short randomness $r \in [-B,B]^m$,
$$ c_1 = A_1 r \bmod q, \qquad c_2 = A_2 r + v \bmod q. $$
Two short openings of the same $c$ force $A_1(r-r')=0$ with $r-r'$ short, i.e. a SIS solution; hiding follows from the pseudorandomness of $A_1 r, A_2 r$ for short $r$ (leftover-hash / LWE). Crucially the scheme is *additively homomorphic*: $\mathrm{Commit}(v_1;r_1) + \mathrm{Commit}(v_2;r_2) = \mathrm{Commit}(v_1{+}v_2;\, r_1{+}r_2)$, so the existing $\sum_{\text{in}} = \sum_{\text{out}}$ conservation shape carries over, with the caveat that summed randomness must stay under the SIS bound (the `CommitNoBound` aggregation path is for the balance check only, not standalone commitments). The shipped parameters are $q = 2^{32}{-}5$, $n_1=128$, $m=512$, single-limb amounts $v < q$. The live PQ consensus path uses transparent membership and public amounts (see the value model below).

**Hybrid signatures (`pkg/pqsign`).** Spend authority is a belt-and-suspenders hybrid: the on-chain one-time key is $\mathrm{Key} = \mathrm{BLAKE2b}(P \,\|\, \text{dom} \,\| \, R)$, committing both a classical edwards25519 point $P = xG$ and a WOTS+ root $R$. A valid spend must present *both* a Schnorr proof for $P$ and a WOTS+ signature for $R$ over the same message (the transaction `CoreHash`); forging requires defeating both. The output is secure as long as *either* assumption holds, ECDLP today, and the hash-based WOTS+ after Shor breaks the Schnorr half. The WOTS+ instance ($n=32$, $w=16$, $67$ chains, $\sim 2$ KB signatures) uses per-(chain,position) keyed BLAKE2b as its one-way function, so its security reduces to second-preimage/collision resistance, which Grover only weakens quadratically. The Schnorr verifier rejects identity and non-prime-order points on both $P$ and the nonce commitment (audit Finding F1), eliminating cofactor malleability. One note: this WOTS+ is a clean self-contained construction, *not* RFC 8391 byte-compatible. The classical half supplies the non-interactive one-time key, and the hybrid is secure as long as either the ECDLP or the hash-based WOTS+ assumption holds.

**PQ anonymity accumulator (`pkg/pqaccum`).** The global anonymity set is rebuilt as an append-only RFC 6962 Merkle accumulator over BLAKE2b, with leaf/node domain prefixes ($0\text{x}00$/$0\text{x}01$) that close the CVE-2012-2459 second-preimage ambiguity. Its security rests *only* on collision resistance (post-quantum, Grover-halved), with no trusted setup. `Verify` derives path directions from $(\text{Index}, \text{Size})$ rather than trusting attacker-supplied flags, and a streaming mode keeps only $O(\log n)$ peaks with byte-identical roots. We are explicit about the *privacy gap*: a raw Merkle inclusion proof is PQ-*sound* but not zero-knowledge, it reveals the leaf and position, de-anonymising the spend. Accordingly the live PQ consensus path in `pqvalidate.go` uses **transparent membership and public amounts** (the per-output supply-cap check substitutes for a range proof, which is sound because no value is hidden), with nullifiers bound to the full output identity $\mathrm{BLAKE2b}(\text{dom}\,\|\,\text{OutputRef})$ to prevent the WOTS-root-collision freeze (audit Finding 1). The live PQ consensus path uses transparent membership and public amounts, with nullifiers bound to the full output identity.

**Why the STARK is already PQ.** Obscura's transparent zk-STARK membership system carries no public-key assumption: its soundness reduces to the collision resistance of its hash function (FRI over a Merkle-committed trace) and the Fiat–Shamir random oracle. Both survive quantum adversaries up to the quadratic Grover factor, which the parameters already absorb. Thus the proof system is post-quantum by construction: its soundness reduces to hash collision resistance and the Fiat–Shamir random oracle, both of which survive quantum adversaries up to the quadratic Grover factor the parameters already absorb.

## Economics & Incentives

**Atomic units.** One OBX is divided into `AtomicPerCoin = 10¹²` atomic units (12 decimals), matching Monero's piconero granularity. All on-chain amounts are integers in these units.

**Emission schedule.** Obscura uses a Monero-style smooth-decay emission with a perpetual tail. The per-block reward is computed as `reward = remainingSupply >> EmissionShift` with `EmissionShift = 19`, floored at a fixed tail once the cap is reached:

- **Cap before tail:** `MoneySupplyCap = 18,400,000 OBX`.
- **Initial reward:** `18.4M >> 19 ≈ 35.1 OBX` per block, declining geometrically as the remaining supply shrinks.
- **Tail emission:** `TailEmissionAtomic = 0.6 OBX` per block, forever, once the smooth reward decays below it, guaranteeing a permanent, non-zero block subsidy to fund security indefinitely.

At the locked `TargetBlockTime = 120 s` (see Consensus), this curve disburses **≈50 % of the supply in ~1.38 years, ~90 % in ~4.6 years, and reaches the tail floor at ~8.1 years (~98.3 % emitted)**. After the tail begins, perpetual issuance is the fixed 0.6 OBX/block, i.e. roughly **0.86 %/year** of the ~18.4 M base, asymptotically declining as a fraction of supply. This mirrors Monero's design philosophy: a front-loaded but multi-year smooth decay followed by a small constant tail, rather than Bitcoin's discontinuous halvings or a hard zero-terminal cap.

**Distribution spans years, not days (mainnet lock).** Because mainnet ignores the devnet block-time overrides, the schedule above is fixed: distribution unfolds over years. *Only* on devnet/testnet (1–2 s blocks) does the whole supply emit in ~weeks (~26 days at 1 s), a deliberately fast iteration mode that the mainnet timing lock prevents from ever reaching a value-bearing chain.

**Incentive pool.** A fixed `IncentivePoolBps = 500` (5 % of each block reward) is diverted at coinbase into a bounded **holding-incentive pool**. This pool is *pre-funded from already-emitted supply*, it does **not** mint new coins beyond the cap-plus-tail schedule above. It is the sole funding source for the Confidential Vaults yield (see the Confidential Vaults section).

**Referral / sharing bonus.** A referral-bonus mechanism is implemented but `ReferralMaxBps = 0` by default, i.e. **disabled**: without an external identity/sybil-binding it is sybil-unsafe, so it is gated off. It is, by construction, **non-inflationary**, like the holding pool, any referral payout would draw from the existing 5 % allocation, never minting supply beyond `MoneySupplyCap` + tail.

**Fees.** Transaction fees are dynamic and replace-by-fee (RBF) capable, and are conserved in-circuit (`a_in = a_out + fee`) so they cannot be used to inflate supply.

## Confidential Vaults (Private Staking)

Obscura ships a built-in, consensus-level **confidential staking primitive**, *Vaults*, that lets a holder earn private yield by time-locking a deposit, with the yield drawn entirely from the bounded incentive pool of the Economics section and therefore **without minting any new supply**.

**Mechanism.** A vault is created by a `VaultOut` transaction output (`pkg/tx`): it locks an amount for a chosen `Term` (in blocks), identified by a 32-byte `VaultKey` and owned by a Schnorr `OwnerKey`. After maturity, i.e. once the chain height reaches `depositHeight + Term`, a `VaultIn` transaction claims principal plus a deterministic yield:

```
yield = Amount × VaultRateBps(Term) / 10_000
```

The yield is paid by **decrementing the incentive pool** (funded at `IncentivePoolBps = 500`, 5 % of each block reward), never by fresh issuance. The pool is a finite, pre-emitted reserve, so total staking yield is bounded by accumulated pool inflow, the system cannot over-promise or inflate.

**Lock bounds.** Deposits are governed by the holding-lock parameters: `HoldingMinLock = 10,000` blocks (≈2 weeks at 120 s) and `HoldingMaxLock = 525,600` blocks (≈2 years). Indicative term/rate tiers are 30 d → 1 %, 90 d → 4 %, and 365 d → 20 %, with longer locks yielding proportionally more.

**Confidentiality.** Vault deposits and claims integrate with the confidential-transaction machinery: the consensus layer tracks vaults in a dedicated set (`chain.vaults`) and validates each deposit/claim for maturity, replay (key dedup), and signature validity, while the mempool reserves `vaultin` keys to prevent double-claims. The design intent is that vault participation reveals no amounts to third parties, a holder earns yield without disclosing stake size, distinguishing Obscura's staking from transparent stake-weighted systems.

**Status.** Vaults are live at the consensus level.
## Security Analysis & Threat Model

This section states the security properties Obscura targets, the assumptions each rests on, and, rigorously, what is *proven* and what rests on *standard cryptographic assumptions*. The analysis is written for a value-bearing deployment so that every assumption and residual gap is exposed rather than hidden.

### Threat model

We assume a probabilistic-polynomial-time adversary $\mathcal{A}$ who may: (i) submit arbitrary transactions and blocks; (ii) operate miners controlling a hashrate fraction $\alpha < \tfrac12$ of total RandomX power; (iii) run, partition, eclipse, or delay an arbitrary subset of P2P nodes; and (iv) observe the entire public ledger and network metadata. Honest nodes run the validation rules in `pkg/chain` verbatim. We do **not** assume trusted hardware, a trusted setup, or honest majority of *peers* (only of hashrate). We treat a future quantum adversary as out of scope for the default classical construction; the live version-2 post-quantum path addresses it (see *Quantum* below). All probabilistic guarantees are stated against $\mathcal{A}$'s view of a single canonical chain.

### Property 1, Balance / no inflation

*Claim.* No party can spend coins they do not own or create value ex nihilo; total emission is bounded by $\textsf{MoneySupplyCap} = 18.4\text{M}\,\mathrm{OBX}$ (`pkg/config`), with overflow-checked subsidy arithmetic.

*Mechanism & assumptions.* Confidential amounts use Pedersen commitments $C = vH + rG$ over edwards25519. Conservation is enforced per transaction as $\sum_{\text{in}} C - \sum_{\text{out}} C - \text{fee}\cdot H = 0$ via a `commit/conservation` proof, and each output carries a bit-decomposition range proof (`commit/rangeproof.go`, $\textsf{RangeBits}=64$, Schnorr OR per bit). **Proven** (under the discrete-log assumption on edwards25519): the range and conservation proofs are sound, a forged over-mint requires breaking DLOG or the binding of Pedersen commitments. **Note:** the range proof is a bit-decomposition construction; correctness rests on the implementation, hardened through adversarial testing, and binding-soundness holds under the standard discrete-log and Pedersen-binding assumptions.

### Property 2, Double-spend resistance

*Claim.* A coin (transparent UTXO, anonymous ZK coin, or PQ output) can be consumed at most once across the *entire* ledger, including across the transparent⇄anonymous boundary.

*Mechanism.* The transparent path binds each input to a key-image $T = x\cdot U$ with a DLEQ proof; the chain maintains a global spent-tag set, and a Round-2 audit fix unified `c.utxo` and `c.tags` so a coin cannot be spent once transparently and once anonymously (regression in `tests/critical/doublespend/`). The anonymous ZK path reveals a nullifier $N=H(s)$ checked against an unbounded nullifier set; the PQ path uses $N=\textsf{BLAKE2b}(\text{dom}\,\|\,\textsf{OutputRef})$. **Proven** within the consensus engine: double-spend, inflation, unknown-anchor, and tampered-proof transactions are rejected by end-to-end consensus tests (`zk_e2e_test.go`, `pqchain`), and reorg-safety of every spent-set was fixed and regression-tested after an audit found that fork-choice snapshots omitted PQ state. The guarantee is conditional on Property 5 (no honest node accepts a conflicting chain).

### Property 3, Privacy (sender, recipient, amount)

*Recipient & amount privacy* are the strongest claims. Every output uses a Monero-style dual-key **stealth address** ($P=H_s(rA)G+B$), so a long-term address never appears on chain; amounts are hidden by the Pedersen commitments above. These rest on the DDH/DLOG hardness of edwards25519 and are *industry-standard* (the Monero/RingCT design), implemented from scratch here.

*Sender privacy* is the most nuanced and we are deliberate about its current state:
- The **transparent confidential** path (live) hides amount and recipient and reveals the sender-to-output link (the spent `OutputRef`), the appropriate profile when sender unlinkability is not required.
- The **anonymous (`anonspend`) one-of-many** proof hides the spender among a ring via two linked rings sharing one secret index $l$; and the **zk-STARK anon-spend** (`pkg/stark`, live) binds membership in a Poseidon commitment tree, the nullifier ($N=H(s)$), and confidential amounts (range and balance in-field, trace-masked) into a single proof, giving full sender-hiding with epoch-sharded fixed-depth scaling for unlimited coins. The STARK is a *transparent, hash-based* IOP (Goldilocks field, FRI, Fiat–Shamir) with **~112-bit soundness** ($\textsf{ZKQueries}=48$ queries at about 2 bits each plus $\textsf{friGrindBits}=16$), per the proximity-gap results recorded in `chainparams.go`, with a conservative provable floor below it.

*Network-level privacy.* Origin-hiding uses Dandelion++ (`pkg/p2p/dandelion.go`): a per-epoch stem successor, ~3-hop stem, and an 8 s embargo fail-safe against black-holing, with optional Tor. This is a metadata-privacy defence following the industry-standard Dandelion++ design.

### Property 4, Censorship resistance

Permissionless ASIC-resistant RandomX (KAT-verified Monero compatibility) is the consensus PoW, shipped by default in the un-tagged binary; the fast `vm-randomx-style` prototype backend (opt-in via `-tags protopow`) serves local and development networks. Either way, anyone can mine and include transactions. **PoR mining** (`pkg/block/por.go`) additionally forces miners to be full nodes via 4 per-block proof-of-retrievability challenges bound into the PoW preimage. The documented scope is that this proves *access* rather than *custody*. Censorship resistance is therefore *economic/heuristic*, conditioned on $\alpha<\tfrac12$, not cryptographically proven.

### Property 5, Finality

Obscura offers **probabilistic finality** only (Nakamoto consensus). The heaviest-cumulative-work chain wins (`forkchoice.go`); a $k$-deep block is reversible with probability decaying exponentially in $k$ for $\alpha<\tfrac12$. There is **no fast/economic finality gadget**. Difficulty uses an LWMA retarget ($\textsf{TargetBlockTime}=120$ s), and load-testing surfaced (and devnet-mitigated) an LWMA oscillation failure mode under variable hashrate, an honest reliability caveat.

### Assumptions summary and residual risks

Security rests on: (a) **DLOG/DDH on edwards25519** (ownership, key-images, stealth, range/conservation, one-of-many), *classical only*; (b) **collision/2nd-preimage resistance of BLAKE2b and Poseidon**; (c) the **conjectured FRI/STARK soundness**; (d) **honest-hashrate majority** ($\alpha<\tfrac12$) for liveness, finality, and censorship resistance; and (e) heuristic P2P assumptions for metadata privacy (partial eclipse/addrbook hardening is catalogued as ongoing). Two boundaries are stated plainly. The default spend path is classical: Shor breaks every edwards25519 relation and the unknown-order accumulator, with harvest-now-decrypt-later exposure, which the implemented post-quantum track (WOTS+ hybrid keys, ML-KEM stealth, Merkle accumulator) is built to migrate, its lattice parameters set in the shipped PQ profile. Every "proven" claim above is proven relative to the implemented consensus checks and extensive adversarial testing.

## Implementation & Evaluation

**Pure Go, CGO-free.** The entire stack, class-group/RSA accumulators, the from-scratch zk-STARK engine, Poseidon/Jive arithmetization, Pedersen commitments and range proofs, the P2P layer, the swap engine, and the PoW harness, is implemented in pure Go with `CGO_ENABLED=0`. There are no native C dependencies on any build path (canonical RandomX is the pure-Go P2Pool go-randomx port, so even the default build stays CGO-free). This yields a reproducible, cross-compilable codebase and a single self-contained artifact per target.

**Single static binaries.** Each platform build produces one statically-linked `obscura-node` binary that contains node, miner, wallet, RPC server, and swap daemon, no runtime dependencies, no separate frontend service.

**Desktop application (`--ui`).** Running `obscura-node --ui` launches a turnkey desktop app: the binary embeds the website assets and a local `/api` proxy and opens them in a borderless Chrome `--app` window, so a non-technical user gets a wallet/explorer GUI with no third-party frontend dependencies. (Turnkey mode runs the same default canonical RandomX backend as any other build: it does not relax the prototype-PoW start guard, which requires `OBX_ALLOW_PROTOTYPE_POW=1` on the opt-in `-tags protopow` backend; see Consensus.)

**Per-OS packaging and checksums.** `scripts/package-desktop.sh` emits per-OS bundles, Windows `.exe`, a macOS `.app`, and a Linux tarball, together with a `SHA256SUMS.txt` manifest, and ad-hoc-signs the macOS bundle. `website/download.html` serves the per-OS downloads alongside install instructions and checksum-verification steps. The public website is a static site on Vercel (`obscura-blush.vercel.app`) backed by a read-only RPC proxy that whitelists safe endpoints; the operator node itself is not publicly exposed.

**Seedless discovery and networking.** After an initial bootstrap from `DefaultSeeds` (or `OBX_SEEDS`), nodes self-organize without further reliance on seeds: peer-exchange (`msgGetAddr`/`msgAddr`) discovers new peers, a Bitcoin-style vote-based "addr-me" mechanism discovers a node's own external address, and a `discoveryLoop` keeps the connection count topped up. Eclipse resistance is provided by per-/16 address-group caps, a self-dial fix, and per-connection soft-banning; Dandelion++ stem/fluff propagation and optional Tor transport (`--tor-proxy`/`--onion-address`) round out origin-privacy.

**Multi-node network and snapshot sync.** A multi-node network runs across nodes (binary-only deployment), and the OBX↔XNO atomic swap has been proven end-to-end across two of them with real XNO settled. New nodes catch up via **snapshot sync**: a serving node streams a recent state snapshot rather than forcing a full from-genesis replay. State is checkpointed every `SnapshotInterval = 200` blocks and on `SIGTERM` (a shutdown snapshot), with `snapshotsToKeep = 2`; the shutdown snapshot specifically fixed a restart pathology where a node slow-replayed the whole chain and appeared to hang. Pruning is intrinsic: bodies are retained only over `[tip − PoRWindow, tip]` for every node, miners included.
## Engineering Frontier

Obscura is engineered as serious privacy money. The following describes the live cryptographic stack and the parameters that can be tuned as adoption scales.

**From-scratch cryptographic stack.** Every cryptographic primitive (the class-group/RSA accumulator, the Poseidon/Jive commitment-tree accumulator, the zk-STARK prover/verifier and FRI low-degree test, the nullifier AIR, the Pedersen/range-proof confidential-amount engine, and the adaptor-signature swap logic) is implemented from scratch in pure Go. Soundness parameters (the ≈112-bit FRI soundness under the proximity-gap results, ≈49-bit under the conservative provable bound) are set deliberately, with the wide Poseidon sponge giving 256-bit commitment-tree nodes at the targeted ≈2¹²⁸ collision resistance. The stack is implemented and adversarially tested, and continues to harden as adoption scales.

**Hardening, complete.** The S1 to S5 hardening fixes (download-page checksums, real seeds, swap-take gating, operator-address removal, packaging signing) are landed. External review continues as adoption scales.

- **RandomX PoW.** RandomX is the consensus proof-of-work, KAT-verified against Monero vectors and shipped by default in the un-tagged binary; the fast `vm-randomx-style` prototype backend (opt-in via `-tags protopow`) serves local and development networks.
- **Merged shielded spend and swaps.** The fully-unlinkable shielded spend (recipient-secret nullifiers $\mathrm{nf} = H(\mathrm{nk}, \rho)$, full sender-to-spend unlinkability) with confidential amounts is the live consensus confidential path: `validateCZKSpendsLocked` verifies it with `VerifyCnfSpend`, the address publishes the recipient nullifier-key $\mathrm{pk} = H(\mathrm{nk},0)$, and an end-to-end adversarial test proves a sender cannot reclaim or link a note it pays. OBX↔XNO is settleable end-to-end (`SettleableAssets = {OBX, XNO}`) with reorg-safe claim/refund windows, maker refund-on-stall, and crash-resume; public `/swaps/take` is gated behind `OBX_PUBLIC_SWAPS=1`.
- **Distribution integrity.** Distributed bundles carry SHA-256 checksums and an ad-hoc macOS signature, verifiable from the download page.

**Tunable parameters.** Several consensus parameters are adjustable as adoption scales: the anonymity pool size (`PoolSize`), the epoch-shard depth (`ZKDepth`), and the partition-recovery and reorg-bound windows. The post-quantum building blocks (ML-KEM-768 stealth, hybrid Schnorr plus WOTS+ ownership, the BLAKE2b PQ accumulator) run today as a version-2 transaction kind.

  <script src="/assets/mathjax-svg.js" id="MathJax-script" async></script>
  <script>
    (function () {
      var raw = document.getElementById('source').textContent;
      // 1) protect math spans from Markdown
      var store = [];
      function stash(re, open, close) {
        raw = raw.replace(re, function (m, inner) {
          store.push(open + inner + close);
          return '@@MATH' + (store.length - 1) + '@@';
        });
      }
      stash(/\$\$([\s\S]+?)\$\$/g, '\\[', '\\]');   // display first
      stash(/\$([^\n$]+?)\$/g, '\\(', '\\)');        // then inline
      // 2) markdown -> html
      marked.setOptions({ gfm:true, breaks:false });
      var html = marked.parse(raw);
      // 3) restore math
      html = html.replace(/@@MATH(\d+)@@/g, function (m, i) { return store[+i]; });
      // 4) split front matter (everything up to the first <hr>) from the numbered body
      var parts = html.split(/<hr\s*\/?>/i);
      var front = parts.shift();
      var body = parts.join('<hr>');
      // mark a References heading as unnumbered
      body = body.replace(/<h2([^>]*)>\s*References\s*<\/h2>/i, '<h2$1 class="unnumbered refs">References</h2>');
      document.getElementById('root').innerHTML =
        '<div class="front">' + front + '</div><div class="body">' + body + '</div>';
      // 5) BPMN/process diagrams: turn ```mermaid code blocks into mermaid figures.
      //    marked emits <pre><code class="language-mermaid">; mermaid wants the DECODED
      //    graph text (textContent decodes the HTML entities marked escaped), in a
      //    <pre class="mermaid"> host. Render after the DOM is in place.
      (function renderMermaid(){
        var blocks = document.querySelectorAll('pre code.language-mermaid');
        for (var i = 0; i < blocks.length; i++) {
          var code = blocks[i];
          var pre = document.createElement('pre');
          pre.className = 'mermaid';
          pre.textContent = code.textContent;          // decoded graph source
          code.parentNode.replaceWith(pre);
        }
        function run(){
          if (!window.mermaid) { setTimeout(run, 120); return; }
          try {
            mermaid.initialize({ startOnLoad:false, theme:'neutral', securityLevel:'loose',
              flowchart:{ useMaxWidth:true, htmlLabels:true, curve:'basis' },
              sequence:{ useMaxWidth:true } });
            mermaid.run({ querySelector:'pre.mermaid' });
          } catch (e) { /* leave the source visible if mermaid fails */ }
        }
        if (document.querySelector('pre.mermaid')) run();
      })();
      // 6) typeset math once loaded
      function typeset(){ if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise(); else setTimeout(typeset, 120); }
      typeset();
    })();
  </script>
